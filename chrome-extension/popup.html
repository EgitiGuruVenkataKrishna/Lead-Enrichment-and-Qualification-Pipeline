<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 15px; font-family: -apple-system, sans-serif; }
        .hidden { display: none; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-success { background: #10b981; color: white; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #4b5563; }
        .input-group input { width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { background: #f9fafb; padding: 10px; border: 1px solid #e5e7eb; border-radius: 4px; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <h3 style="margin-top:0;">LeadQ Enrichment</h3>
    <button id="fetchBtn" class="btn btn-primary">Extract from Page</button>
    
    <div id="form-container" class="hidden" style="margin-top: 15px;">
        <div class="input-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Lead Name">
        </div>
        <div class="input-group">
            <label>Company</label>
            <input type="text" id="company" placeholder="Company Name">
        </div>
        <div class="input-group">
            <label>Domain</label>
            <input type="text" id="domain" placeholder="example.com">
        </div>
        <button id="sendBtn" class="btn btn-success">Enrich Lead</button>
    </div>

    <div id="loading" class="hidden text-center">
        <div class="spinner"></div>
        <p style="text-align: center; font-size: 13px; color: #6b7280;">Enriching...</p>
    </div>

    <div id="result-container" class="hidden result-box">
        <p><strong>Status:</strong> <span id="res-status"></span></p>
        <p><strong>ICP Score:</strong> <span id="res-score"></span></p>
        <p><strong>Top Signal:</strong> <span id="res-signal"></span></p>
        <p><strong>Drafts:</strong> <span id="res-drafts"></span></p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
