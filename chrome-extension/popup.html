<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      color: #333;
      box-sizing: border-box;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      color: #1a73e8;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #666;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #1557b0;
    }
    .hidden {
      display: none;
    }
    #loading {
      text-align: center;
      padding: 20px 0;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1a73e8;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #results {
      padding: 12px;
      background-color: #f8f9fa;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
      font-size: 13px;
    }
    .result-item {
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }
    .badge-green { background-color: #28a745; }
    .badge-orange { background-color: #fd7e14; }
    .badge-red { background-color: #dc3545; }
    textarea {
      width: 100%;
      height: 80px;
      font-size: 12px;
      padding: 6px;
      box-sizing: border-box;
      margin-top: 4px;
      resize: vertical;
    }
    .btn-secondary {
      background-color: #6c757d;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <h3>Lead Enricher</h3>
  
  <form id="lead-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label for="company">Company</label>
      <input type="text" id="company" placeholder="Acme Corp">
    </div>
    <div class="form-group">
      <label for="domain">Domain</label>
      <input type="text" id="domain" placeholder="acme.com">
    </div>
    <button type="submit" id="enrich-btn">Enrich Lead</button>
  </form>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <div>Enriching lead in real-time...</div>
  </div>

  <div id="results" class="hidden">
    <div class="result-item"><strong>Score:</strong> <span id="res-score"></span></div>
    <div class="result-item"><strong>Signals:</strong> <span id="res-signals"></span></div>
    <div class="result-item">
      <strong>Outreach Draft (Direct):</strong>
      <textarea id="res-draft-direct" readonly></textarea>
    </div>
    <div class="result-item">
      <strong>Outreach Draft (Consultative):</strong>
      <textarea id="res-draft-consultative" readonly></textarea>
    </div>
    <button id="copy-draft-btn" class="btn-secondary">Copy Direct Draft</button>
  </div>

  <div id="error-msg" class="hidden" style="color: #dc3545; text-align: center; padding: 10px;"></div>

  <script src="popup.js"></script>
</body>
</html>
